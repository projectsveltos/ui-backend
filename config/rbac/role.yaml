---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: controller-role
rules:
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - authentication.k8s.io
  resources:
  - tokenreviews
  verbs:
  - create
- apiGroups:
  - authorization.k8s.io
  resources:
  - subjectaccessreviews
  verbs:
  - create
- apiGroups:
  - cluster.x-k8s.io
  resources:
  - clusters
  - clusters/status
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - config.projectsveltos.io
  resources:
  - clusterconfigurations
  - clusterprofiles
  - clusterprofiles/status
  - clusterreports
  - clustersummaries
  - clustersummaries/status
  - profiles
  - profiles/status
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - lib.projectsveltos.io
  resources:
  - classifierreports
  - classifiers
  - classifiers/status
  - debuggingconfigurations
  - eventreports
  - eventreports/status
  - eventsources
  - eventsources/status
  - eventtriggers
  - eventtriggers/status
  - managementclusterclassifierreports
  - managementclusterclassifiers
  - managementclusterclassifiers/status
  - sveltosclusters
  - sveltosclusters/status
  verbs:
  - get
  - list
  - watch
